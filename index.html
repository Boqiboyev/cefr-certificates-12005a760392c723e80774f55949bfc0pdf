<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Certificate downloader</title>
  <style>
    html,body{height:100%;margin:0;background:#fff}
    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #eee;padding:20px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.08);text-align:center;font-family:system-ui,Segoe UI,Roboto,Arial}
    button{margin:8px 6px;padding:10px 16px;border-radius:6px;border:1px solid #ccc;background:#f6f6f6;cursor:pointer}
    a{color:#06c}
  </style>
</head>
<body>
  <p style="display:none"></p>

  <div class="modal">
    <div class="card">
      <h1>Download your PDF</h1>
      <p>
        <a id="downloadLink" href="UZ00425500428-25-05-2025-ETRF.pdf" download="certificate.pdf">Click here to download the PDF</a>
      </p>
      
    </div>
  </div>

  <script>
    // automatically trigger download when page loads
    window.addEventListener('DOMContentLoaded', function() {
      var link = document.getElementById('downloadLink');
      if (link) {
        // try to simulate click
        link.click();
      }
    });
  </script>
</body>
</html>
